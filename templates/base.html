<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Licenser System{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: #111827;
            color: white;
            padding: 20px;
            position: fixed;
            top: 0;
            left: 0;
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        .sidebar.collapsed {
            width: 70px;
            padding: 20px 10px;
        }

        .sidebar h3 {
            margin-top: 0;
            font-size: 18px;
        }

        .sidebar.collapsed h3 {
            display: none;
        }

        .sidebar a {
            display: block;
            color: #d1d5db;
            text-decoration: none;
            padding: 10px;
            margin: 6px 0;
            border-radius: 6px;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
        }

        .sidebar.collapsed a {
            text-align: center;
            font-size: 12px;
        }

        .sidebar a:hover {
            background: #374151;
            color: white;
        }

        .sidebar a.active {
            background: #2563eb;
            color: white;
        }

        /* ===== MAIN ===== */
        .main {
            margin-left: 240px;
            padding: 20px;
            transition: margin-left 0.3s ease;
        }

        .main.expanded {
            margin-left: 70px;
        }

        /* ===== TOGGLE BUTTON ===== */
        .toggle-btn {
            background: #2563eb;
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
            font-size: 14px;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {

            .sidebar {
                transform: translateX(-100%);
                width: 240px;
                z-index: 999;
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .main {
                margin-left: 0 !important;
            }
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">

        <button class="toggle-btn" onclick="toggleSidebar()">
            <span id="toggleIcon"><<</span>
        </button>

        <h3>Licenser System</h3>
        <hr>

        <a href="{{ url_for('licenser_dashboard') }}"
           class="{% if request.endpoint == 'licenser_dashboard' %}active{% endif %}">
           Dashboard
        </a>

        <a href="{{ url_for('requests_list') }}"
           class="{% if request.endpoint == 'requests_list' %}active{% endif %}">
           Requests
        </a>

        <a href="{{ url_for('change_password') }}"
           class="{% if request.endpoint == 'change_password' %}active{% endif %}">
           Change Password
        </a>

        {% if session.get('licenser_id') %}
            <hr>
            <small style="color:#9ca3af;">Admin Tools</small>

            <a href="{{ url_for('api_logs') }}"
               class="{% if request.endpoint == 'api_logs' %}active{% endif %}">
               API Logs
            </a>
        {% endif %}

        <hr>

        <a href="{{ url_for('licenser_logout') }}">
            Logout
        </a>
    </div>

    <!-- MAIN -->
    <div class="main" id="main">
        {% block content %}{% endblock %}
    </div>

    <!-- SCRIPT -->
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            const main = document.getElementById("main");
            const icon = document.getElementById("toggleIcon");

            sidebar.classList.toggle("collapsed");
            main.classList.toggle("expanded");

            if (sidebar.classList.contains("collapsed")) {
                icon.innerText = ">>";
            } else {
                icon.innerText = "<<";
            }
        }
    </script>

</body>
</html>
